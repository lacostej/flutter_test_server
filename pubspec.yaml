name: flutter_test_server
description: A lightweight, embeddable HTTP server for Flutter apps that exposes a REST API for on-device test automation — inspired by Unium for Unity.
version: 0.2.1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  shelf_web_socket: ^2.0.0
  web_socket_channel: ^3.0.0
  vm_service: ^14.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
